{% extends "base.html" %}
{% block content %}
<h1>Tìm kiếm</h1>
<form method="POST">
    <input type="text" name="keyword" placeholder="Nhập từ khóa" value="{{ keyword }}" required>
    <button type="submit">Tìm kiếm</button>
</form>
<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Bằng cấp</th>
            <th>Giáo viên</th>
        </tr>
    </thead>
    <tbody>
        {% for result in results %}
        <tr>
            <td>{{ result[0] }}</td>
            <td>{{ result[1] }}</td>
            <td>{{ result[2] }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
